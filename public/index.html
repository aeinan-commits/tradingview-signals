<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIST Teknik Analiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;color:#fff;font-family:Arial,sans-serif;padding:20px;max-width:1000px;margin:0 auto}
h1{color:#f0b90b;text-align:center;margin-bottom:20px}
.search{display:flex;gap:10px;margin-bottom:16px;max-width:500px;margin-left:auto;margin-right:auto}
.search input{flex:1;padding:12px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:1rem;text-transform:uppercase}
.search button{padding:12px 20px;background:#f0b90b;color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.tf-bar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.tf-bar button{padding:8px 16px;background:#1a1a1a;color:#aaa;border:1px solid #333;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:bold}
.tf-bar button.active{background:#f0b90b;color:#000;border-color:#f0b90b}
.price-header{text-align:center;margin-bottom:20px}
.price-header .tk{color:#f0b90b;font-size:1.5rem;font-weight:bold}
.price-header .pr{font-size:2rem;font-weight:bold;margin-top:4px}
.price-header .tf{color:#666;font-size:.85rem;margin-top:4px}
.section{margin-bottom:28px}
.section-title{color:#888;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;border-bottom:1px solid #2a2a2a;padding-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.grid{display:flex;flex-wrap:wrap;gap:12px}
.ma-box{flex:1;min-width:150px;background:#1a1a1a;border-radius:12px;padding:16px;border-top:3px solid #333}
.ma-box.up{border-top-color:#00c853}
.ma-box.down{border-top-color:#ff4444}
.ma-name{color:#aaa;font-size:.8rem;font-weight:bold;margin-bottom:6px}
.ma-value{font-size:1.1rem;font-weight:bold;margin-bottom:8px}
.ma-diff{font-size:1.4rem;font-weight:bold}
.ma-diff.up{color:#00c853}
.ma-diff.down{color:#ff4444}
.ma-status{font-size:.75rem;color:#666;margin-top:4px}
.vol-box{flex:1;min-width:220px;background:#1a1a1a;border-radius:12px;padding:18px;border-left:4px solid #333}
.vol-box.green{border-left-color:#00c853}
.vol-box.red{border-left-color:#ff4444}
.vol-box.purple{border-left-color:#9c27b0}
.vol-box.yellow{border-left-color:#f0b90b}
.vol-label{color:#aaa;font-size:.85rem;font-weight:bold;margin-bottom:8px}
.vol-main{font-size:1.4rem;font-weight:bold;margin-bottom:8px}
.vol-main.green{color:#00c853}
.vol-main.red{color:#ff4444}
.vol-main.purple{color:#ce93d8}
.vol-main.yellow{color:#f0b90b}
.vol-desc{font-size:.8rem;color:#888;line-height:1.5}
.bar-bg{background:#2a2a2a;border-radius:10px;height:8px;margin:10px 0;overflow:hidden}
.bar-fill{height:100%;border-radius:10px}
.rsi-box{flex:1;min-width:280px;background:#1a1a1a;border-radius:12px;padding:20px}
.rsi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.rsi-val{font-size:2rem;font-weight:bold}
.rsi-label{font-size:1rem;font-weight:bold;padding:4px 14px;border-radius:20px}
.rsi-track{position:relative;background:linear-gradient(to right,#00c853 0%,#00c853 30%,#444 30%,#444 70%,#ff4444 70%,#ff4444 100%);height:10px;border-radius:6px;margin:18px 0 8px}
.rsi-marker{position:absolute;top:-6px;width:4px;height:22px;background:#fff;border-radius:2px;transform:translateX(-50%)}
.rsi-scale{display:flex;justify-content:space-between;font-size:.7rem;color:#666}
.rsi-desc{font-size:.85rem;color:#888;line-height:1.5;margin-top:12px}
.sig-box{flex:1;min-width:280px;background:#1a1a1a;border-radius:12px;padding:20px;border-left:4px solid #333}
.sig-box.green{border-left-color:#00c853}
.sig-box.red{border-left-color:#ff4444}
.sig-label{color:#aaa;font-size:.85rem;font-weight:bold;margin-bottom:10px}
.sig-main{font-size:1.6rem;font-weight:bold;margin-bottom:6px}
.sig-main.green{color:#00c853}
.sig-main.red{color:#ff4444}
.sig-sub{font-size:1rem;color:#aaa;margin-bottom:10px}
.sig-desc{font-size:.85rem;color:#888;line-height:1.5}
.st-box{background:#1a1a1a;border-radius:12px;padding:22px;border-left:5px solid #333}
.st-box.up{border-left-color:#00c853}
.st-box.down{border-left-color:#ff4444}
.st-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.st-main{font-size:1.8rem;font-weight:bold}
.st-main.up{color:#00c853}
.st-main.down{color:#ff4444}
.st-sub{font-size:.95rem;color:#aaa}
.st-desc{font-size:.85rem;color:#888;line-height:1.5}
.period-btns{display:flex;gap:6px}
.period-btns button{padding:4px 12px;background:#1a1a1a;color:#aaa;border:1px solid #333;border-radius:6px;cursor:pointer;font-size:.75rem;font-weight:bold}
.period-btns button.active{background:#f0b90b;color:#000;border-color:#f0b90b}
.sr-wrap{background:#1a1a1a;border-radius:12px;padding:20px}
.sr-row{display:flex;align-items:center;gap:12px;padding:8px 0}
.sr-tag{font-size:.7rem;font-weight:bold;padding:3px 8px;border-radius:6px;min-width:60px;text-align:center}
.sr-tag.res{background:#ff444422;color:#ff4444}
.sr-tag.sup{background:#00c85322;color:#00c853}
.sr-tag.cur{background:#f0b90b;color:#000}
.sr-level{font-size:1.1rem;font-weight:bold;min-width:90px}
.sr-dist{font-size:.85rem;color:#aaa}
.sr-touch{font-size:.7rem;color:#666;margin-left:auto}
.sr-divider{border:none;border-top:1px dashed #333;margin:6px 0}
.sr-current-row{background:#f0b90b15;border-radius:8px;padding:8px 12px;margin:6px 0}
.error{color:#ff4444;text-align:center;padding:20px}
.loading{color:#aaa;text-align:center;padding:20px}
#result{display:none}
</style>
</head>
<body>
<h1>📊 BIST Teknik Analiz</h1>
<div class="search">
<input type="text" id="ti" placeholder="Hisse kodu (örn: THYAO)" maxlength="10"/>
<button id="btn">Analiz Et</button>
</div>
<div class="tf-bar">
<button data-tf="15m">15dk</button>
<button data-tf="1h">1 Saat</button>
<button data-tf="4h">4 Saat</button>
<button data-tf="1d" class="active">Günlük</button>
<button data-tf="1wk">Haftalık</button>
<button data-tf="1mo">Aylık</button>
</div>
<div id="result"></div>
<script>
var lastData = null;
var selectedPeriod = 'd1';
var selectedTF = '1d';
var currentTicker = '';

var tfLabels = { '15m':'15 Dakikalık', '1h':'1 Saatlik', '4h':'4 Saatlik', '1d':'Günlük', '1wk':'Haftalık', '1mo':'Aylık' };

document.getElementById('btn').addEventListener('click', function(){ run(); });
document.getElementById('ti').addEventListener('keypress', function(e){ if(e.key==='Enter') run(); });

document.querySelectorAll('.tf-bar button').forEach(function(b){
  b.addEventListener('click', function(){
    selectedTF = b.getAttribute('data-tf');
    document.querySelectorAll('.tf-bar button').forEach(function(x){ x.className = ''; });
    b.className = 'active';
    if (currentTicker) run(true);
  });
});

function fmtVol(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2) + ' Mlr';
  if (n >= 1e6) return (n/1e6).toFixed(2) + ' Mn';
  if (n >= 1e3) return (n/1e3).toFixed(1) + ' B';
  return n;
}

function pvText(pv, days) {
  var cls, title, desc;
  var pct = pv.pricePct >= 0 ? '+' + pv.pricePct : pv.pricePct;
  if (pv.signal === 'strong_up') { cls = 'green'; title = '📈 Güçlü Yükseliş'; desc = 'Son ' + days + ' barda fiyat %' + pct + ' yükseldi VE hacim ortalamanın üstünde. Alıcılar kararlı.'; }
  else if (pv.signal === 'weak_up') { cls = 'yellow'; title = '⚠️ Zayıf Yükseliş'; desc = 'Son ' + days + ' barda fiyat %' + pct + ' yükseldi AMA hacim düşük. Teyit bekleyin.'; }
  else if (pv.signal === 'strong_down') { cls = 'red'; title = '📉 Güçlü Düşüş'; desc = 'Son ' + days + ' barda fiyat %' + pct + ' düştü VE hacim yüksek. Satıcılar baskın.'; }
  else { cls = 'yellow'; title = '🔸 Zayıf Düşüş'; desc = 'Son ' + days + ' barda fiyat %' + pct + ' düştü AMA hacim düşük. Panik yok.'; }
  return { cls: cls, title: title, desc: desc };
}

function renderPriceVol() {
  if (!lastData) return;
  var v = lastData.volume;
  var dayMap = { d1: 1, d5: 5, d20: 20 };
  var pv = v.priceVol[selectedPeriod];
  var t = pvText(pv, dayMap[selectedPeriod]);
  var box = document.getElementById('pvBox');
  box.className = 'vol-box ' + t.cls;
  box.innerHTML =
    '<div class="vol-label">Fiyat + Hacim İlişkisi</div>' +
    '<div class="vol-main ' + t.cls + '">' + t.title + '</div>' +
    '<div class="vol-desc">' + t.desc + '</div>';
  ['d1','d5','d20'].forEach(function(p){
    document.getElementById('pb_' + p).className = (p === selectedPeriod) ? 'active' : '';
  });
}

function setPeriod(p) { selectedPeriod = p; renderPriceVol(); }

async function run(keepTicker) {
  var t = currentTicker;
  if (!keepTicker) { t = document.getElementById('ti').value.trim().toUpperCase(); }
  if (!t) return;
  currentTicker = t;
  var r = document.getElementById('result');
  r.style.display = 'block';
  r.innerHTML = '<p class="loading">⏳ Yükleniyor...</p>';
  try {
    var res = await fetch('/analyze/' + t + '?tf=' + selectedTF);
    var d = await res.json();
    if (d.error) { r.innerHTML = '<p class="error">❌ ' + d.error + '</p>'; return; }
    lastData = d;

    // SUPERTREND
    var stBox = '';
    if (d.supertrend) {
      var st = d.supertrend;
      var up = st.direction === 'up';
      var stCls = up ? 'up' : 'down';
      var stMain = up ? '🟢 AL (Yükseliş)' : '🔴 SAT (Düşüş)';
      var stDist = st.dist >= 0 ? '+' + st.dist : st.dist;
      var stDesc = up
        ? 'Fiyat Supertrend çizgisinin üstünde — trend yukarı. Çizgi (₺' + st.value + ') altındaki ilk önemli destek/stop seviyesi gibi çalışır. Fiyat bunun altına inerse trend dönebilir.'
        : 'Fiyat Supertrend çizgisinin altında — trend aşağı. Çizgi (₺' + st.value + ') üstündeki ilk direnç/stop seviyesi gibi çalışır. Fiyat bunun üstüne çıkarsa trend dönebilir.';
      stBox =
        '<div class="st-box ' + stCls + '">' +
          '<div class="st-top">' +
            '<span class="st-main ' + stCls + '">' + stMain + '</span>' +
            '<span class="st-sub">Çizgi: ₺' + st.value + ' (' + stDist + '% mesafe) &nbsp;|&nbsp; ATR: ' + st.atr + '</span>' +
          '</div>' +
          '<div class="st-desc">' + stDesc + '</div>' +
        '</div>';
    }

    // DESTEK / DİRENÇ
    var sr = d.supportResistance;
    var srRows = '';
    sr.resistances.slice().reverse().forEach(function(rz){
      srRows += '<div class="sr-row"><span class="sr-tag res">DİRENÇ</span><span class="sr-level">₺' + rz.level + '</span><span class="sr-dist">+' + rz.dist + '% yukarıda</span><span class="sr-touch">' + rz.touches + ' temas</span></div>';
    });
    srRows += '<div class="sr-current-row"><div class="sr-row" style="padding:0"><span class="sr-tag cur">FİYAT</span><span class="sr-level">₺' + d.currentPrice + '</span><span class="sr-dist">şu anki fiyat</span></div></div>';
    sr.supports.forEach(function(sp){
      srRows += '<div class="sr-row"><span class="sr-tag sup">DESTEK</span><span class="sr-level">₺' + sp.level + '</span><span class="sr-dist">' + sp.dist + '% aşağıda</span><span class="sr-touch">' + sp.touches + ' temas</span></div>';
    });
    var srNote = '"Temas" sayısı o seviyenin kaç kez test edildiğini gösterir — çok temas = güçlü seviye.';
    var srBox = '<div class="sr-wrap">' + srRows + '<hr class="sr-divider"><div class="vol-desc">' + srNote + '</div></div>';

    // EMA
    var maBoxes = d.mas.map(function(m) {
      var cls = m.above ? 'up' : 'down';
      var sign = m.diff >= 0 ? '+' : '';
      var status = m.above ? 'Fiyat üstünde' : 'Fiyat altında';
      return '<div class="ma-box ' + cls + '"><div class="ma-name">EMA' + m.period + '</div><div class="ma-value">₺' + m.value + '</div><div class="ma-diff ' + cls + '">' + sign + m.diff + '%</div><div class="ma-status">' + status + '</div></div>';
    }).join('');

    // HACİM
    var v = d.volume;
    var ratioCls, ratioText, ratioDesc;
    if (v.ratio >= 2) { ratioCls = 'purple'; ratioText = v.ratio + 'x 🔥'; ratioDesc = 'Hacim ortalamanın ' + v.ratio + ' katı. Çok güçlü ilgi.'; }
    else if (v.ratio >= 1) { ratioCls = 'green'; ratioText = v.ratio + 'x ✅'; ratioDesc = 'Hacim ortalamanın üstünde. Katılım sağlıklı.'; }
    else { ratioCls = 'red'; ratioText = v.ratio + 'x 😴'; ratioDesc = 'Hacim ortalamanın altında. İlgi zayıf.'; }

    var trCls, trText, trDesc;
    if (v.trend === 'rising') { trCls = 'green'; trText = '↗️ Artıyor (+' + v.trendPct + '%)'; trDesc = 'Son barların hacmi ortalamadan yüksek. İlgi artıyor.'; }
    else if (v.trend === 'falling') { trCls = 'red'; trText = '↘️ Azalıyor (' + v.trendPct + '%)'; trDesc = 'Hacim düşüyor. İlgi azalıyor.'; }
    else { trCls = 'yellow'; trText = '→ Sabit (' + v.trendPct + '%)'; trDesc = 'Hacim ortalama seviyelerde.'; }

    var posCls = v.posPct > 80 ? 'purple' : v.posPct > 50 ? 'green' : v.posPct > 25 ? 'yellow' : 'red';
    var posBarColor = v.posPct > 80 ? '#9c27b0' : v.posPct > 50 ? '#00c853' : v.posPct > 25 ? '#f0b90b' : '#ff4444';
    var posDesc;
    if (v.posPct > 80) posDesc = 'Hacim son 50 barın zirvesine yakın. Olağanüstü ilgi.';
    else if (v.posPct > 50) posDesc = 'Hacim son 50 barın üst yarısında.';
    else if (v.posPct > 25) posDesc = 'Hacim orta seviyede.';
    else posDesc = 'Hacim son 50 barın alt diliminde. Sakin.';

    var obvCls, obvText, obvDesc;
    if (v.obvSignal === 'confirm_up') { obvCls = 'green'; obvText = '✅ Birikim'; obvDesc = 'OBV yükseliyor, fiyat da yükseliyor. Para girişi yükselişi doğruluyor.'; }
    else if (v.obvSignal === 'confirm_down') { obvCls = 'red'; obvText = '❌ Dağıtım'; obvDesc = 'OBV düşüyor, fiyat da düşüyor. Para çıkışı düşüşü doğruluyor.'; }
    else if (v.obvSignal === 'bull_div') { obvCls = 'purple'; obvText = '🔼 Gizli Alım'; obvDesc = 'Fiyat düşerken OBV yükseliyor! Pozitif uyumsuzluk, dönüş sinyali olabilir.'; }
    else { obvCls = 'yellow'; obvText = '🔽 Gizli Satım'; obvDesc = 'Fiyat yükselirken OBV düşüyor. Negatif uyumsuzluk, dikkat.'; }

    var volBoxes =
      '<div class="vol-box ' + ratioCls + '"><div class="vol-label">Hacim Oranı</div><div class="vol-main ' + ratioCls + '">' + ratioText + '</div><div class="vol-desc">' + ratioDesc + '<br><br>Şimdi: ' + fmtVol(v.current) + ' | 20 Ort: ' + fmtVol(v.avg20) + '</div></div>' +
      '<div class="vol-box" id="pvBox"></div>' +
      '<div class="vol-box ' + trCls + '"><div class="vol-label">Hacim Trendi</div><div class="vol-main ' + trCls + '">' + trText + '</div><div class="vol-desc">' + trDesc + '</div></div>' +
      '<div class="vol-box ' + posCls + '"><div class="vol-label">Son 50 Bar Hacim Konumu</div><div class="vol-main ' + posCls + '">%' + v.posPct + '</div><div class="bar-bg"><div class="bar-fill" style="width:' + v.posPct + '%;background:' + posBarColor + '"></div></div><div class="vol-desc">' + posDesc + '<br>Zirve: ' + fmtVol(v.max50) + '</div></div>' +
      '<div class="vol-box ' + obvCls + '"><div class="vol-label">OBV (Para Akışı)</div><div class="vol-main ' + obvCls + '">' + obvText + '</div><div class="vol-desc">' + obvDesc + '</div></div>';

    // RSI
    var rsi = d.rsi;
    var rsiCls, rsiLabel, rsiLabelColor, rsiDesc;
    if (rsi < 30) { rsiCls = '#00c853'; rsiLabel = 'Aşırı Satım'; rsiLabelColor = '#00c85322'; rsiDesc = 'RSI 30 altında — hisse aşırı satılmış. Tepki/dönüş alımı gelebilir.'; }
    else if (rsi > 70) { rsiCls = '#ff4444'; rsiLabel = 'Aşırı Alım'; rsiLabelColor = '#ff444422'; rsiDesc = 'RSI 70 üstünde — hisse aşırı alınmış. Kâr satışı/düzeltme gelebilir.'; }
    else { rsiCls = '#f0b90b'; rsiLabel = 'Nötr'; rsiLabelColor = '#f0b90b22'; rsiDesc = 'RSI 30-70 arası nötr bölgede. Belirgin aşırılık yok.'; }

    var rsiBox =
      '<div class="rsi-box"><div class="rsi-top"><span class="rsi-val" style="color:' + rsiCls + '">' + rsi + '</span><span class="rsi-label" style="background:' + rsiLabelColor + ';color:' + rsiCls + '">' + rsiLabel + '</span></div><div class="rsi-track"><div class="rsi-marker" style="left:' + rsi + '%"></div></div><div class="rsi-scale"><span>0</span><span>30</span><span>70</span><span>100</span></div><div class="rsi-desc">' + rsiDesc + '</div></div>';

    var sigBox;
    if (d.rsiSignal !== null) {
      var above = d.rsiAboveSignal;
      var sigCls = above ? 'green' : 'red';
      var pct = d.rsiVsSignalPct >= 0 ? '+' + d.rsiVsSignalPct : d.rsiVsSignalPct;
      var sigDesc = above ? 'RSI, 9 barlık ortalamasının üstünde. Momentum yukarı dönüyor.' : 'RSI, 9 barlık ortalamasının altında. Momentum aşağı dönüyor.';
      sigBox = '<div class="sig-box ' + sigCls + '"><div class="sig-label">RSI vs 9 Bar Ortalaması</div><div class="sig-main ' + sigCls + '">' + (above ? '▲ Üstünde' : '▼ Altında') + '</div><div class="sig-sub">RSI: ' + rsi + ' | 9B Ort: ' + d.rsiSignal + ' (' + pct + '%)</div><div class="sig-desc">' + sigDesc + '</div></div>';
    } else {
      sigBox = '<div class="sig-box"><div class="sig-label">RSI Sinyal Çizgisi</div><div class="sig-desc">Yeterli veri yok</div></div>';
    }

    r.innerHTML =
      '<div class="price-header"><div class="tk">📈 ' + d.ticker + '</div><div class="pr">₺' + d.currentPrice + '</div><div class="tf">' + tfLabels[d.timeframe] + ' grafik</div></div>' +
      '<div class="section"><div class="section-title">Supertrend — Trend Yönü</div>' + stBox + '</div>' +
      '<div class="section"><div class="section-title">Destek / Direnç Seviyeleri</div>' + srBox + '</div>' +
      '<div class="section"><div class="section-title">Üstel Hareketli Ortalamalar (EMA)</div><div class="grid">' + maBoxes + '</div></div>' +
      '<div class="section"><div class="section-title"><span>Hacim Analizi</span><div class="period-btns"><button id="pb_d1" onclick="setPeriod(\'d1\')">1 Bar</button><button id="pb_d5" onclick="setPeriod(\'d5\')">5 Bar</button><button id="pb_d20" onclick="setPeriod(\'d20\')">20 Bar</button></div></div><div class="grid">' + volBoxes + '</div></div>' +
      '<div class="section"><div class="section-title">RSI (14) — Göreceli Güç Endeksi</div><div class="grid">' + rsiBox + sigBox + '</div></div>';

    selectedPeriod = 'd1';
    renderPriceVol();

  } catch(e) {
    r.innerHTML = '<p class="error">❌ Hata: ' + e.message + '</p>';
  }
}
</script>
</body>
</html>
