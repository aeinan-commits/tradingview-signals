<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIST Teknik Analiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;color:#fff;font-family:Arial,sans-serif;padding:20px;max-width:1000px;margin:0 auto}
h1{color:#f0b90b;text-align:center;margin-bottom:20px}
.search{display:flex;gap:10px;margin-bottom:16px;max-width:500px;margin-left:auto;margin-right:auto}
.search input{flex:1;padding:12px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:1rem;text-transform:uppercase}
.search button{padding:12px 20px;background:#f0b90b;color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.tf-bar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.tf-bar button{padding:8px 16px;background:#1a1a1a;color:#aaa;border:1px solid #333;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:bold}
.tf-bar button.active{background:#f0b90b;color:#000;border-color:#f0b90b}
.price-header{text-align:center;margin-bottom:20px}
.price-header .tk{color:#f0b90b;font-size:1.5rem;font-weight:bold}
.price-header .pr{font-size:2rem;font-weight:bold;margin-top:4px}
.price-header .tf{color:#666;font-size:.85rem;margin-top:4px}
.section{margin-bottom:28px}
.section-title{color:#888;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;border-bottom:1px solid #2a2a2a;padding-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.grid{display:flex;flex-wrap:wrap;gap:12px}
.ma-box{flex:1;min-width:150px;background:#1a1a1a;border-radius:12px;padding:16px;border-top:3px solid #333}
.ma-box.up{border-top-color:#00c853}.ma-box.down{border-top-color:#ff4444}
.ma-name{color:#aaa;font-size:.8rem;font-weight:bold;margin-bottom:6px}
.ma-value{font-size:1.1rem;font-weight:bold;margin-bottom:8px}
.ma-diff{font-size:1.4rem;font-weight:bold}
.ma-diff.up{color:#00c853}.ma-diff.down{color:#ff4444}
.ma-status{font-size:.75rem;color:#666;margin-top:4px}
.vol-box{flex:1;min-width:220px;background:#1a1a1a;border-radius:12px;padding:18px;border-left:4px solid #333}
.vol-box.green{border-left-color:#00c853}.vol-box.red{border-left-color:#ff4444}.vol-box.purple{border-left-color:#9c27b0}.vol-box.yellow{border-left-color:#f0b90b}
.vol-label{color:#aaa;font-size:.85rem;font-weight:bold;margin-bottom:8px}
.vol-main{font-size:1.4rem;font-weight:bold;margin-bottom:8px}
.vol-main.green{color:#00c853}.vol-main.red{color:#ff4444}.vol-main.purple{color:#ce93d8}.vol-main.yellow{color:#f0b90b}
.vol-desc{font-size:.8rem;color:#888;line-height:1.5}
.bar-bg{background:#2a2a2a;border-radius:10px;height:8px;margin:10px 0;overflow:hidden}
.bar-fill{height:100%;border-radius:10px}
.rsi-box{flex:1;min-width:280px;background:#1a1a1a;border-radius:12px;padding:20px}
.rsi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.rsi-val{font-size:2rem;font-weight:bold}
.rsi-label{font-size:1rem;font-weight:bold;padding:4px 14px;border-radius:20px}
.rsi-track{position:relative;background:linear-gradient(to right,#00c853 0%,#00c853 30%,#444 30%,#444 70%,#ff4444 70%,#ff4444 100%);height:10px;border-radius:6px;margin:18px 0 8px}
.rsi-marker{position:absolute;top:-6px;width:4px;height:22px;background:#fff;border-radius:2px;transform:translateX(-50%)}
.rsi-scale{display:flex;justify-content:space-between;font-size:.7rem;color:#666}
.rsi-desc{font-size:.85rem;color:#888;line-height:1.5;margin-top:12px}
.mfi-track{position:relative;background:linear-gradient(to right,#00c853 0%,#00c853 20%,#444 20%,#444 80%,#ff4444 80%,#ff4444 100%);height:10px;border-radius:6px;margin:18px 0 8px}
.sig-box{flex:1;min-width:280px;background:#1a1a1a;border-radius:12px;padding:20px;border-left:4px solid #333}
.sig-box.green{border-left-color:#00c853}.sig-box.red{border-left-color:#ff4444}.sig-box.yellow{border-left-color:#f0b90b}
.sig-label{color:#aaa;font-size:.85rem;font-weight:bold;margin-bottom:10px}
.sig-main{font-size:1.6rem;font-weight:bold;margin-bottom:6px}
.sig-main.green{color:#00c853}.sig-main.red{color:#ff4444}.sig-main.yellow{color:#f0b90b}
.sig-sub{font-size:1rem;color:#aaa;margin-bottom:10px}
.sig-desc{font-size:.85rem;color:#888;line-height:1.5}
.div-row{margin-top:12px;padding-top:12px;border-top:1px solid #2a2a2a;font-size:.82rem;line-height:1.5}
.div-tag{display:inline-block;padding:2px 9px;border-radius:6px;font-size:.72rem;font-weight:bold;margin-bottom:4px}
.div-tag.bull{background:#00c85322;color:#00c853}.div-tag.bear{background:#ff444422;color:#ff4444}.div-tag.both{background:#9c27b022;color:#ce93d8}.div-tag.none{background:#33333388;color:#888}
.div-text{color:#888}
.st-box{background:#1a1a1a;border-radius:12px;padding:22px;border-left:5px solid #333}
.st-box.up{border-left-color:#00c853}.st-box.down{border-left-color:#ff4444}
.st-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.st-main{font-size:1.8rem;font-weight:bold}
.st-main.up{color:#00c853}.st-main.down{color:#ff4444}
.st-sub{font-size:.95rem;color:#aaa}
.st-desc{font-size:.85rem;color:#888;line-height:1.5}
.ich-wrap{background:#1a1a1a;border-radius:12px;padding:22px;border-left:5px solid #333}
.ich-wrap.above{border-left-color:#00c853}.ich-wrap.below{border-left-color:#ff4444}.ich-wrap.inside{border-left-color:#f0b90b}
.ich-main{font-size:1.7rem;font-weight:bold;margin-bottom:6px}
.ich-main.above{color:#00c853}.ich-main.below{color:#ff4444}.ich-main.inside{color:#f0b90b}
.ich-verdict{font-size:.9rem;color:#aaa;margin-bottom:16px;line-height:1.5}
.ich-lines{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.ich-line{flex:1;min-width:130px;background:#0f0f0f;border-radius:8px;padding:12px}
.ich-line-name{font-size:.7rem;color:#888;font-weight:bold;margin-bottom:4px}
.ich-line-val{font-size:1.05rem;font-weight:bold}
.ich-sub{padding:10px 0;border-top:1px solid #2a2a2a;font-size:.85rem;color:#888;line-height:1.5}
.ich-sub b{color:#ccc}
.cloud-badge{display:inline-block;padding:2px 10px;border-radius:6px;font-size:.75rem;font-weight:bold}
.cloud-badge.green{background:#00c85322;color:#00c853}.cloud-badge.red{background:#ff444422;color:#ff4444}
.period-btns{display:flex;gap:6px}
.period-btns button{padding:4px 12px;background:#1a1a1a;color:#aaa;border:1px solid #333;border-radius:6px;cursor:pointer;font-size:.75rem;font-weight:bold}
.period-btns button.active{background:#f0b90b;color:#000;border-color:#f0b90b}
.sr-wrap{background:#1a1a1a;border-radius:12px;padding:20px}
.sr-row{display:flex;align-items:center;gap:12px;padding:8px 0}
.sr-tag{font-size:.7rem;font-weight:bold;padding:3px 8px;border-radius:6px;min-width:60px;text-align:center}
.sr-tag.res{background:#ff444422;color:#ff4444}.sr-tag.sup{background:#00c85322;color:#00c853}.sr-tag.cur{background:#f0b90b;color:#000}
.sr-level{font-size:1.1rem;font-weight:bold;min-width:90px}
.sr-dist{font-size:.85rem;color:#aaa}
.sr-touch{font-size:.7rem;color:#666;margin-left:auto}
.sr-divider{border:none;border-top:1px dashed #333;margin:6px 0}
.sr-current-row{background:#f0b90b15;border-radius:8px;padding:8px 12px;margin:6px 0}
.error{color:#ff4444;text-align:center;padding:20px}
.loading{color:#aaa;text-align:center;padding:20px}
#result{display:none}
.fav-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#1a1a1a;border:1px solid #333;border-radius:20px;cursor:pointer;font-size:.82rem;color:#f0b90b;font-weight:bold}
.fav-chip:hover{background:#252525;border-color:#f0b90b}
.fav-chip .x{color:#666;font-weight:bold;font-size:.9rem}
.fav-chip .x:hover{color:#ff4444}
.fav-star{cursor:pointer;font-size:1.4rem;user-select:none}
</style>
</head>
<body>
<h1>📊 BIST Teknik Analiz</h1>
<div class="search">
<input type="text" id="ti" placeholder="Hisse kodu (örn: THYAO)" maxlength="10"/>
<button id="btn">Analiz Et</button>
</div>
<div class="search">
<input type="text" id="tiOzel" placeholder="Özel analiz için hisse kodu" maxlength="10"/>
<button id="btnOzel" style="background:#9c27b0;color:#fff">Özel Analiz</button>
</div>
<div id="resultOzel" style="display:none;margin-bottom:24px"></div>
<div id="favBar" style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;max-width:700px;margin-left:auto;margin-right:auto"></div>
<div style="text-align:center;margin-bottom:20px">
<button id="scanBtn" style="padding:10px 24px;background:#9c27b0;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:.9rem">📊 BIST100 Tara</button>
<button id="scanBtnOzel" style="padding:10px 24px;background:#7b1fa2;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:.9rem;margin-left:8px">🧪 BIST100 Tara Özel</button>
</div>
<div id="scanResult" style="display:none;margin-bottom:24px"></div>
<div class="tf-bar">
<button data-tf="15m">15dk</button>
<button data-tf="1h">1 Saat</button>
<button data-tf="4h">4 Saat</button>
<button data-tf="1d" class="active">Günlük</button>
<button data-tf="1wk">Haftalık</button>
<button data-tf="1mo">Aylık</button>
</div>
<div id="result"></div>
<script>
var lastData=null, selectedPeriod='d1', selectedTF='1d', currentTicker='';

// ===== FAVORİ LİSTESİ =====
function getFavs(){ try{ return JSON.parse(localStorage.getItem('bistFavs')||'[]'); }catch(e){ return []; } }
function saveFavs(arr){ try{ localStorage.setItem('bistFavs', JSON.stringify(arr)); }catch(e){} }
function isFav(t){ return getFavs().indexOf(t)>-1; }
function toggleFav(t){
  if(!t) return;
  var f=getFavs(), i=f.indexOf(t);
  if(i>-1) f.splice(i,1); else f.unshift(t);
  if(f.length>15) f=f.slice(0,15);
  saveFavs(f); renderFavs();
  if(currentTicker) updateStar();
}
function renderFavs(){
  var bar=document.getElementById('favBar'); var f=getFavs();
  if(f.length===0){ bar.innerHTML='<span style="color:#555;font-size:.8rem">★ Favori eklemek için bir hisse analiz edip yıldıza tıklayın</span>'; return; }
  bar.innerHTML=f.map(function(t){
    return '<span class="fav-chip"><span onclick="openFav(\''+t+'\')">★ '+t+'</span><span class="x" onclick="event.stopPropagation();toggleFav(\''+t+'\')">✕</span></span>';
  }).join('');
}
function openFav(t){ document.getElementById('ti').value=t; currentTicker=t; run(); }
function updateStar(){
  var s=document.getElementById('favStar'); if(!s) return;
  var on=isFav(currentTicker);
  s.textContent=on?'★':'☆';
  s.style.color=on?'#f0b90b':'#666';
  s.title=on?'Favorilerden çıkar':'Favorilere ekle';
}
document.addEventListener('DOMContentLoaded', renderFavs);
renderFavs();
// ===== SKOR GEÇMİŞİ (son 3) =====
function getHist(ticker){ try{ return JSON.parse(localStorage.getItem('bistHist_'+ticker)||'[]'); }catch(e){ return []; } }
function saveScoreHist(ticker, tf, pct, verdict){
  if(!ticker) return;
  try{
    var h=getHist(ticker);
    var now=new Date();
    var stamp=now.toLocaleDateString('tr-TR')+' '+now.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
    // Aynı dakika + aynı TF tekrarını ekleme
    if(h.length>0 && h[0].stamp===stamp && h[0].tf===tf) return;
    h.unshift({stamp:stamp, tf:tf, pct:pct, verdict:verdict});
    if(h.length>3) h=h.slice(0,3);
    localStorage.setItem('bistHist_'+ticker, JSON.stringify(h));
  }catch(e){}
}
function histPanelHTML(ticker){
  var h=getHist(ticker);
  if(h.length<=1) return '<div class="vol-desc" style="padding:10px">Henüz yeterli geçmiş yok. Bu hisseyi farklı zamanlarda analiz ettikçe skor değişimi burada birikecek.</div>';
  var rows=h.map(function(e,idx){
    var c=e.pct>=60?'#00c853':e.pct>40?'#f0b90b':'#ff4444';
    var tag=idx===0?' <span style="font-size:.65rem;color:#666">(en son)</span>':'';
    return '<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #222"><span style="color:#888;font-size:.8rem;min-width:120px">'+e.stamp+tag+'</span><span style="color:#666;font-size:.75rem;min-width:60px">'+(tfLabels[e.tf]||e.tf)+'</span><span style="color:'+c+';font-weight:bold;min-width:50px">%'+e.pct+'</span><span style="color:'+c+';font-size:.82rem">'+e.verdict+'</span></div>';
  }).join('');
  // Trend yorumu (en son vs bir önceki)
  var trendTxt='';
  if(h.length>=2){
    var diff=h[0].pct-h[1].pct;
    if(diff>3) trendTxt='<div style="color:#00c853;font-size:.85rem;margin-top:8px">↗ Skor son bakışa göre yükseldi (+'+diff+' puan) — sinyaller güçleniyor.</div>';
    else if(diff<-3) trendTxt='<div style="color:#ff4444;font-size:.85rem;margin-top:8px">↘ Skor son bakışa göre düştü ('+diff+' puan) — sinyaller zayıflıyor.</div>';
    else trendTxt='<div style="color:#f0b90b;font-size:.85rem;margin-top:8px">→ Skor son bakışa göre yatay (±'+Math.abs(diff)+' puan).</div>';
  }
  return rows+trendTxt;
}
function toggleHist(){
  var p=document.getElementById('histPanel');
  if(!p) return;
  p.style.display = p.style.display==='none' ? 'block' : 'none';
}
var tfLabels={'15m':'15 Dakikalık','1h':'1 Saatlik','4h':'4 Saatlik','1d':'Günlük','1wk':'Haftalık','1mo':'Aylık'};

document.getElementById('btn').addEventListener('click', function(){ run(); });
document.getElementById('ti').addEventListener('keypress', function(e){ if(e.key==='Enter') run(); });
document.querySelectorAll('.tf-bar button').forEach(function(b){
  b.addEventListener('click', function(){
    selectedTF=b.getAttribute('data-tf');
    document.querySelectorAll('.tf-bar button').forEach(function(x){ x.className=''; });
    b.className='active';
    if(currentTicker) run(true);
  });
});

function fmtVol(n){ if(n>=1e9)return(n/1e9).toFixed(2)+' Mlr'; if(n>=1e6)return(n/1e6).toFixed(2)+' Mn'; if(n>=1e3)return(n/1e3).toFixed(1)+' B'; return n; }
  // ===== BIST100 TARAMA =====
document.getElementById('scanBtn').addEventListener('click', runScan);
async function runScan(){
  var btn=document.getElementById('scanBtn');
  var box=document.getElementById('scanResult');
  btn.disabled=true; btn.textContent='⏳ Taranıyor... (1-2 dk)';
  box.style.display='block';
  box.innerHTML='<div style="background:#1a1a1a;border-radius:12px;padding:30px;text-align:center;color:#aaa">⏳ BIST100 taranıyor, lütfen bekleyin (1-2 dakika sürebilir)...</div>';
  try{
    var res=await fetch('/scan');
    var d=await res.json();
    if(!d.results){ box.innerHTML='<div class="error">Tarama başarısız.</div>'; btn.disabled=false; btn.textContent='📊 BIST100 Tara'; return; }
    var groups={'GÜÇLÜ AL':[],'AL':[],'NÖTR':[],'SAT':[],'GÜÇLÜ SAT':[]};
    d.results.forEach(function(r){ if(groups[r.verdict]) groups[r.verdict].push(r); });
    var colors={'GÜÇLÜ AL':'#00c853','AL':'#66bb6a','NÖTR':'#f0b90b','SAT':'#ff7043','GÜÇLÜ SAT':'#ff4444'};
    var emojis={'GÜÇLÜ AL':'🟢🟢','AL':'🟢','NÖTR':'🟡','SAT':'🔴','GÜÇLÜ SAT':'🔴🔴'};
    var html='<div style="background:#1a1a1a;border-radius:16px;padding:20px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px"><div style="color:#f0b90b;font-size:1.1rem;font-weight:bold">📊 BIST100 Tarama Sonuçları</div><div style="color:#666;font-size:.8rem">'+d.count+' hisse tarandı • '+new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})+'</div></div>';
    ['GÜÇLÜ AL','AL','NÖTR','SAT','GÜÇLÜ SAT'].forEach(function(g){
      var arr=groups[g]; if(arr.length===0) return;
      html+='<div style="margin-bottom:18px"><div style="color:'+colors[g]+';font-size:.85rem;font-weight:bold;margin-bottom:8px;border-bottom:1px solid #2a2a2a;padding-bottom:6px">'+emojis[g]+' '+g+' ('+arr.length+')</div><div style="display:flex;flex-wrap:wrap;gap:8px">';
      arr.forEach(function(r){
        html+='<div onclick="openScan(\''+r.ticker+'\')" style="cursor:pointer;background:#0f0f0f;border:1px solid #2a2a2a;border-left:3px solid '+colors[g]+';border-radius:8px;padding:8px 12px;min-width:130px;flex:0 0 auto" onmouseover="this.style.background=\'#252525\'" onmouseout="this.style.background=\'#0f0f0f\'">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px"><span style="color:#f0b90b;font-weight:bold;font-size:.9rem">'+r.ticker+'</span><span style="color:'+colors[g]+';font-weight:bold;font-size:.85rem">%'+r.pct+'</span></div>'+
          '<div style="color:#888;font-size:.75rem;margin-top:2px">₺'+r.price+'</div>'+
        '</div>';
      });
      html+='</div></div>';
    });
    // ===== STRATEJİLERE UYAN HİSSELER (sadece sinyal verenler) =====
    // ===== ÇOKLU STRATEJİ KESİŞİMİ (en az 3 stratejide olanlar) =====
    var stratKeys=['momentum','trend','high52','relStrength','meanRev','vpa'];
    var stratNames={momentum:'Momentum',trend:'Trend',high52:'52H Zirve',relStrength:'Göreceli Güç',meanRev:'Ort. Dönüş',vpa:'VPA'};
    var multi=d.results.map(function(r){
      if(!r.strategies) return null;
      var hits=stratKeys.filter(function(k){ return r.strategies[k]; });
      return hits.length>=3 ? {r:r, hits:hits} : null;
    }).filter(function(x){ return x; });
    multi.sort(function(a,b){ return b.hits.length-a.hits.length || b.r.norm-a.r.norm; });
    if(multi.length>0){
      var vColors={'GÜÇLÜ AL':'#00c853','AL':'#66bb6a','NÖTR':'#f0b90b','SAT':'#ff7043','GÜÇLÜ SAT':'#ff4444'};
      var vEmojis={'GÜÇLÜ AL':'🟢🟢','AL':'🟢','NÖTR':'🟡','SAT':'🔴','GÜÇLÜ SAT':'🔴🔴'};
      html+='<div style="margin-top:24px;padding:16px;border:2px solid #f0b90b;border-radius:14px;background:#f0b90b0a"><div style="color:#f0b90b;font-size:1.05rem;font-weight:bold;margin-bottom:4px">⭐ Öne Çıkanlar — En Az 3 Stratejide</div><div class="vol-desc" style="margin-bottom:14px">Birden fazla stratejinin aynı anda işaret ettiği hisseler. Yanlarında genel teknik skor sonucu gösterilir.</div>';
      multi.forEach(function(m){
        var r=m.r;
        var vc=vColors[r.verdict]||'#888', ve=vEmojis[r.verdict]||'';
        var tags=m.hits.map(function(k){ return '<span style="display:inline-block;background:#9c27b022;color:#ce93d8;font-size:.68rem;padding:2px 7px;border-radius:5px;margin:2px 3px 0 0">'+stratNames[k]+'</span>'; }).join('');
        html+='<div onclick="openScan(\''+r.ticker+'\')" style="cursor:pointer;background:#0f0f0f;border:1px solid #2a2a2a;border-left:4px solid '+vc+';border-radius:10px;padding:12px;margin-bottom:8px" onmouseover="this.style.background=\'#252525\'" onmouseout="this.style.background=\'#0f0f0f\'">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">'+
            '<span style="color:#f0b90b;font-weight:bold;font-size:1rem">'+r.ticker+' <span style="color:#666;font-weight:normal;font-size:.8rem">₺'+r.price+'</span></span>'+
            '<span style="color:'+vc+';font-weight:bold;font-size:.88rem">'+ve+' '+r.verdict+' &nbsp;%'+r.pct+'</span>'+
          '</div>'+
          '<div style="margin-top:6px"><span style="color:#888;font-size:.72rem">'+m.hits.length+' strateji: </span>'+tags+'</div>'+
        '</div>';
      });
      html+='</div>';
    }
    var stratDefs=[
      {key:'momentum', title:'🚀 Momentum', sub:'Son 3 ayda güçlü yükseliş'},
      {key:'trend', title:'📈 Trend Takibi', sub:'Fiyat > EMA50 > EMA200'},
      {key:'high52', title:'🏔️ 52 Hafta Zirvesi', sub:'Zirveye %5 yakın'},

      {key:'meanRev', title:'🔄 Ortalamaya Dönüş', sub:'Aşırı satım + uzun trend sağlam'},
      {key:'vpa', title:'📊 Hacim-Fiyat (VPA)', sub:'Anna Coulling — hacim/fiyat uyumu'}
    ];
    var anyStrat=stratDefs.some(function(s){ return d.results.some(function(r){ return r.strategies && r.strategies[s.key]; }); });
    if(anyStrat){
      html+='<div style="margin-top:24px;padding-top:16px;border-top:2px solid #2a2a2a"><div style="color:#9c27b0;font-size:1.05rem;font-weight:bold;margin-bottom:4px">🎯 Stratejilere Uyan Hisseler</div><div class="vol-desc" style="margin-bottom:14px">Her strateji kendi kuralına uyan hisseleri listeler. Nötr/sinyal vermeyen hisseler gösterilmez.</div>';
      stratDefs.forEach(function(s){

        if(matches.length===0) return;
        html+='<div style="margin-bottom:18px"><div style="color:#ce93d8;font-size:.9rem;font-weight:bold;margin-bottom:2px">'+s.title+' <span style="color:#666;font-weight:normal">('+matches.length+')</span></div><div style="color:#666;font-size:.72rem;margin-bottom:8px">'+s.sub+'</div>';
        matches.forEach(function(r){
          html+='<div onclick="openScan(\''+r.ticker+'\')" style="cursor:pointer;background:#0f0f0f;border:1px solid #2a2a2a;border-left:3px solid #9c27b0;border-radius:8px;padding:10px 12px;margin-bottom:6px" onmouseover="this.style.background=\'#252525\'" onmouseout="this.style.background=\'#0f0f0f\'">'+
            '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px"><span style="color:#f0b90b;font-weight:bold;font-size:.9rem">'+r.ticker+'</span><span style="color:#888;font-size:.78rem">₺'+r.price+'</span></div>'+
            '<div style="color:#aaa;font-size:.78rem;margin-top:4px;line-height:1.4">'+r.strategies[s.key]+'</div>'+
          '</div>';
        });
        html+='</div>';
      });
      html+='</div>';
    }
    html+='<div class="vol-desc" style="margin-top:8px">Hızlı skor (çoklu zaman dilimi hariç) ile hesaplanmıştır. Bir hisseye tıklayarak tam analizini açabilirsiniz. Yatırım tavsiyesi değildir.</div></div>';
    box.innerHTML=html;
  }catch(e){ box.innerHTML='<div class="error">❌ Tarama hatası: '+e.message+'</div>'; }
  btn.disabled=false; btn.textContent='📊 BIST100 Tara';
}
function openScan(t){

function buildChart(d){
  var cd=d.chartData;
  if(!cd || !cd.closes || cd.closes.length<2) return '<div class="vol-desc">Grafik için yeterli veri yok.</div>';
  var closes=cd.closes;
  var W=900, H=340, padL=55, padR=15, padT=15, padB=25;
  var n=closes.length;
  // Min/max (fiyat + tüm EMA + S/D dahil)
  var allVals=closes.slice();
  [cd.ema20,cd.ema50,cd.ema200].forEach(function(s){ if(s) s.forEach(function(v){ if(v!==null&&v!==undefined) allVals.push(v); }); });
  var srLines=[];
  if(d.supportResistance){
    d.supportResistance.resistances.forEach(function(r){ srLines.push({v:r.level,type:'res'}); allVals.push(r.level); });
    d.supportResistance.supports.forEach(function(s){ srLines.push({v:s.level,type:'sup'}); allVals.push(s.level); });
  }
  var minV=Math.min.apply(null,allVals), maxV=Math.max.apply(null,allVals);
  var pad=(maxV-minV)*0.05; minV-=pad; maxV+=pad;
  function x(i){ return padL + (i/(n-1))*(W-padL-padR); }
  function y(v){ return padT + (1-(v-minV)/(maxV-minV))*(H-padT-padB); }
  function pathOf(arr){
    var dpath='', started=false;
    for(var i=0;i<arr.length;i++){
      var v=arr[i]; if(v===null||v===undefined) continue;
      dpath += (started?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)+' '; started=true;
    }
    return dpath;
  }
  // Fiyat alanı (dolgu)
  var priceLine=pathOf(closes);
  var areaPath='M'+x(0).toFixed(1)+' '+y(closes[0]).toFixed(1)+' ';
  for(var i=1;i<n;i++) areaPath+='L'+x(i).toFixed(1)+' '+y(closes[i]).toFixed(1)+' ';
  areaPath+='L'+x(n-1).toFixed(1)+' '+(H-padB)+' L'+x(0).toFixed(1)+' '+(H-padB)+' Z';
  // Y ekseni etiketleri (5 kademe)
  var yLabels='';
  for(var g=0;g<=4;g++){
    var val=minV+(maxV-minV)*(g/4); var yy=y(val);
    yLabels+='<line x1="'+padL+'" y1="'+yy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+yy.toFixed(1)+'" stroke="#222" stroke-width="1"/>';
    yLabels+='<text x="'+(padL-6)+'" y="'+(yy+3).toFixed(1)+'" fill="#666" font-size="10" text-anchor="end">'+val.toFixed(2)+'</text>';
  }
  // S/D çizgileri
  var srSvg='';
  srLines.forEach(function(s){
    var yy=y(s.v); var col=s.type==='res'?'#ff4444':'#00c853';
    srSvg+='<line x1="'+padL+'" y1="'+yy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+yy.toFixed(1)+'" stroke="'+col+'" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>';
  });
  // EMA çizgileri
  var emaSvg='';
  if(cd.ema20) emaSvg+='<path d="'+pathOf(cd.ema20)+'" fill="none" stroke="#f0b90b" stroke-width="1.3" opacity="0.9"/>';
  if(cd.ema50) emaSvg+='<path d="'+pathOf(cd.ema50)+'" fill="none" stroke="#2196f3" stroke-width="1.3" opacity="0.9"/>';
  if(cd.ema200) emaSvg+='<path d="'+pathOf(cd.ema200)+'" fill="none" stroke="#9c27b0" stroke-width="1.3" opacity="0.9"/>';
  // Son fiyat noktası
  var lastX=x(n-1), lastY=y(closes[n-1]);
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">'+
    '<defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0b90b" stop-opacity="0.25"/><stop offset="100%" stop-color="#f0b90b" stop-opacity="0"/></linearGradient></defs>'+
    yLabels+srSvg+
    '<path d="'+areaPath+'" fill="url(#pg)"/>'+
    '<path d="'+priceLine+'" fill="none" stroke="#fff" stroke-width="1.8"/>'+
    emaSvg+
    '<circle cx="'+lastX.toFixed(1)+'" cy="'+lastY.toFixed(1)+'" r="3.5" fill="#f0b90b"/>'+
    '</svg>';
  var legend='<div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:10px;font-size:.75rem">'+
    '<span style="color:#fff">━ Fiyat</span>'+
    '<span style="color:#f0b90b">━ EMA20</span>'+
    '<span style="color:#2196f3">━ EMA50</span>'+
    '<span style="color:#9c27b0">━ EMA200</span>'+
    '<span style="color:#ff4444">┄ Direnç</span>'+
    '<span style="color:#00c853">┄ Destek</span>'+
    '</div>';
  return '<div style="background:#1a1a1a;border-radius:12px;padding:16px">'+svg+legend+'<div class="vol-desc" style="margin-top:8px;text-align:center">Son '+n+' bar ('+(tfLabels[d.timeframe]||d.timeframe)+'). Noktalı çizgiler destek/direnç seviyeleri.</div></div>';
}
function divRow(div, indName){

  if(div==='bullish'){tag='<span class="div-tag bull">🟢 POZİTİF UYUMSUZLUK</span>';text='Fiyat daha düşük dip yaparken '+indName+' daha yüksek dip yaptı. Düşüş gücünü kaybediyor — yukarı dönüş sinyali olabilir.';}

  else if(div==='both'){tag='<span class="div-tag both">🟣 ÇİFT UYUMSUZLUK</span>';text='Hem pozitif hem negatif uyumsuzluk izi var — kararsız/geçiş bölgesi, dikkatli olun.';}
  else{tag='<span class="div-tag none">UYUMSUZLUK YOK</span>';text='Fiyat ve '+indName+' uyumlu hareket ediyor, belirgin bir uyumsuzluk tespit edilmedi.';}
  return '<div class="div-row">'+tag+'<div class="div-text">'+text+'</div></div>';
}

function pvText(pv, days){
  var cls,title,desc; var pct=pv.pricePct>=0?'+'+pv.pricePct:pv.pricePct;
  if(pv.signal==='strong_up'){cls='green';title='📈 Güçlü Yükseliş';desc='Son '+days+' barda fiyat %'+pct+' yükseldi VE hacim ortalamanın üstünde. Alıcılar kararlı.';}
  else if(pv.signal==='weak_up'){cls='yellow';title='⚠️ Zayıf Yükseliş';desc='Son '+days+' barda fiyat %'+pct+' yükseldi AMA hacim düşük. Teyit bekleyin.';}
  else if(pv.signal==='strong_down'){cls='red';title='📉 Güçlü Düşüş';desc='Son '+days+' barda fiyat %'+pct+' düştü VE hacim yüksek. Satıcılar baskın.';}
  else{cls='yellow';title='🔸 Zayıf Düşüş';desc='Son '+days+' barda fiyat %'+pct+' düştü AMA hacim düşük. Panik yok.';}
  return {cls:cls,title:title,desc:desc};
}

async function run(keepTicker){
  var t=currentTicker;
  if(!keepTicker){ t=document.getElementById('ti').value.trim().toUpperCase(); }
  if(!t)return;
  currentTicker=t;
  var scanBox=document.getElementById('scanResult');
  if(scanBox) scanBox.style.display='none';
  var r=document.getElementById('result');
  r.style.display='block';
  r.innerHTML='<p class="loading">⏳ Yükleniyor...</p>';
  try{
    var res=await fetch('/analyze/'+t+'?tf='+selectedTF);
    var d=await res.json();
    if(d.error){ r.innerHTML='<p class="error">❌ '+d.error+'</p>'; return; }
    lastData=d;

    // ===== GENEL ÖZET SKORU =====
    var votes=[]; // {name, points, detail, weighted}
    var trendStrong = d.adx && d.adx.adx>=25;
    var tMult = trendStrong?1.15:1; // ADX trend çarpanı

    function addVote(name, points, detail, isTrend){
      if(points===null||points===undefined) return;
      var w = isTrend ? points*tMult : points;
      votes.push({name:name, points:points, detail:detail, weighted:w, trend:!!isTrend});
    }

    // --- DESTEK / DİRENÇ ---
    if(d.supportResistance){
      var firstSup = d.supportResistance.supports[0];
      var firstRes = d.supportResistance.resistances[0];
      if(firstSup){
        var sd = Math.abs(firstSup.dist);
        if(sd<=1) addVote('S/D: Desteğe çok yakın', 1, 'İlk destek %'+firstSup.dist+' (≤%1)');
        if(sd>=4) addVote('S/D: Destek uzak', -1, 'İlk destek %'+firstSup.dist+' (≥%4)');
      }
      if(firstRes){
        var rd = Math.abs(firstRes.dist);
        if(rd>=4) addVote('S/D: Direnç uzak', 1, 'İlk direnç %'+firstRes.dist+' (≥%4)');
      }
    }

   // --- EMA (20,50,200) + kırılım bonusu ---
    if(d.mas){
      var emaPts={20:0.25, 50:0.5, 200:1};
      [20,50,200].forEach(function(p){
        var m=d.mas.find(function(x){return x.period===p;});
        if(m && m.above){ addVote('EMA'+p, emaPts[p], 'Fiyat üstünde', true); }
      });
      // Yeni kırılım bonusu (server'dan justCrossed bilgisi gelirse)
      if(d.maCross){
        if(d.maCross.ema50Up) addVote('EMA50 yeni kırılım', 1, 'Son barda yukarı geçti', true);
        if(d.maCross.ema200Up) addVote('EMA200 yeni kırılım', 1, 'Son barda yukarı geçti', true);
      }
    }
    // --- SERT DÜŞÜŞ / TEPE-DÖNÜŞ CEZASI ---
    (function(){
      if(!d.chartData || !d.chartData.closes || d.chartData.closes.length<22) return;
      var cl=d.chartData.closes, n=cl.length;
      var last=cl[n-1], prev=cl[n-2];
      var dayChg=((last-prev)/prev)*100;
      // Son 20 barın tepesi
      var recentHigh=Math.max.apply(null, cl.slice(n-20));
      var nearTop = last >= recentHigh*0.95; // zirvenin %5 altına kadar "tepe yakını"
      if(dayChg<=-3){
        if(nearTop){
          votes.push({name:'⚠️ Tepeden Sert Dönüş', points:-2.5, detail:'Son bar %'+dayChg.toFixed(1)+', fiyat zirveye yakın', weighted:-2.5, trend:false});
        } else {
          votes.push({name:'⚠️ Sert Düşüş', points:-1.5, detail:'Son bar %'+dayChg.toFixed(1)+' düştü', weighted:-1.5, trend:false});
        }
      }
    })();
    // --- HACİM ---
 
    if(d.volume){
      // Hacim + son bar yönü birlikte (açığa satış yok)
      var lastBarUp = d.volume.priceVol && d.volume.priceVol.d1 ? d.volume.priceVol.d1.priceUp : true;
     if(d.volume.ratio>=1){
        addVote('Hacim Oranı', lastBarUp?1:-1, lastBarUp?'Yüksek hacim + fiyat yukarı (güçlü alım)':'Yüksek hacim + fiyat aşağı (güçlü satış)');
      } else {
        // Hacim düşük + fiyat yukarı → zayıf/güvenilmez yükseliş
        if(lastBarUp){
          addVote('Hacim Oranı', -0.5, 'Düşük hacimle yükseliş (zayıf/güvenilmez)');
        } else {
          addVote('Hacim Oranı', 0, 'Ortalama altı hacim (zayıf katılım)');
        }
      }
      var pv5=d.volume.priceVol.d5;
      if(pv5) addVote('Fiyat+Hacim (5 bar)', pv5.priceUp?1:-1, pv5.priceUp?'Olumlu':'Olumsuz');
      if(d.volume.trend==='rising') addVote('Hacim Trendi', 1, 'Artıyor');
      else if(d.volume.trend==='falling') addVote('Hacim Trendi', -1, 'Azalıyor');
      else addVote('Hacim Trendi', 0, 'Sabit');
      var pp=d.volume.posPct;
      if(pp>50) addVote('50 Bar Hacim Konumu', 0.5, '%'+pp+' (>50)');
      else if(pp<25) addVote('50 Bar Hacim Konumu', -0.5, '%'+pp+' (<25)');
      else addVote('50 Bar Hacim Konumu', 0, '%'+pp);
      // OBV ana sinyal
      var os=d.volume.obvSignal;
      var ovMap={confirm_up:0.5, confirm_down:-0.5, bull_div:1, bear_div:-1};
      addVote('OBV Sinyal', ovMap[os], {confirm_up:'Birikim',confirm_down:'Dağıtım',bull_div:'Gizli alım',bear_div:'Gizli satım'}[os]);
      // OBV uyumsuzluk
      var od=d.volume.obvDivergence;
      if(od==='bullish') addVote('OBV Uyumsuzluk', 1, 'Pozitif');
      else if(od==='bearish') addVote('OBV Uyumsuzluk', -1, 'Negatif');
    }

    // Düşen bıçak durumu: fiyat EMA50 altı + ADX güçlü
    var ema50obj=d.mas?d.mas.find(function(x){return x.period===50;}):null;
    var fallingKnife = ema50obj && !ema50obj.above && d.adx && d.adx.adx>=25;
    // --- RSI ---
    if(d.rsi!==undefined){
      var rn=d.rsi<30?1:d.rsi>70?-1:0;
      if(rn===1 && fallingKnife){ rn=0; } // düşen bıçak: aşırı satım alım sayılmaz
      addVote('RSI', rn, d.rsi<30?(fallingKnife?'Aşırı satım (düşen bıçak — nötrlendi)':'Aşırı satım'):d.rsi>70?'Aşırı alım':'Nötr ('+d.rsi+')');
      if(d.rsiAboveSignal!==null && d.rsiAboveSignal!==undefined) addVote('RSI vs 9B Ort', d.rsiAboveSignal?0.5:-0.5, d.rsiAboveSignal?'Üstünde':'Altında');
      if(d.rsiDivergence==='bullish') addVote('RSI Uyumsuzluk', 1, 'Pozitif');
      else if(d.rsiDivergence==='bearish') addVote('RSI Uyumsuzluk', -1, 'Negatif');
    }

    // --- MFI ---
    if(d.mfi){
      var mn=d.mfi.value<20?1:d.mfi.value>80?-1:0;
      if(mn===1 && fallingKnife){ mn=0; } // düşen bıçak koruması
      addVote('MFI', mn, d.mfi.value<20?(fallingKnife?'Aşırı satım (düşen bıçak — nötrlendi)':'Aşırı satım'):d.mfi.value>80?'Aşırı alım':'Nötr ('+d.mfi.value+')');
      if(d.mfi.aboveSMA!==null && d.mfi.aboveSMA!==undefined) addVote('MFI vs 20B Ort', d.mfi.aboveSMA?0.5:-0.5, d.mfi.aboveSMA?'Üstünde':'Altında');
      if(d.mfi.divergence==='bullish') addVote('MFI Uyumsuzluk', 1, 'Pozitif');
      else if(d.mfi.divergence==='bearish') addVote('MFI Uyumsuzluk', -1, 'Negatif');
    }

    // --- MOMENTUM ---
    if(d.momentum){
      var mq={strong_up:1, weak_up:0.5, weak_down:-0.5, strong_down:-1}[d.momentum.signal];
      addVote('Momentum', mq, {strong_up:'Güçlü pozitif',weak_up:'Zayıflayan pozitif',weak_down:'Zayıflayan negatif',strong_down:'Güçlü negatif'}[d.momentum.signal]);
      addVote('Momentum vs 15B Ort', d.momentum.aboveSMA?0.5:-0.5, d.momentum.aboveSMA?'Üstünde':'Altında');
      if(d.momentum.divergence==='bullish') addVote('Momentum Uyumsuzluk', 1, 'Pozitif');
      else if(d.momentum.divergence==='bearish') addVote('Momentum Uyumsuzluk', -1, 'Negatif');
    }

    // --- CCI ---
    if(d.cci){
      var cq={strong_up:1, mild_up:0.5, mild_down:-0.5, strong_down:-1}[d.cci.signal];
      addVote('CCI', cq, {strong_up:'Güçlü pozitif',mild_up:'Hafif pozitif',mild_down:'Hafif negatif',strong_down:'Güçlü negatif'}[d.cci.signal]);
      addVote('CCI vs 14B Ort', d.cci.aboveSMA?0.5:-0.5, d.cci.aboveSMA?'Üstünde':'Altında');
      if(d.cci.divergence==='bullish') addVote('CCI Uyumsuzluk', 1, 'Pozitif');
      else if(d.cci.divergence==='bearish') addVote('CCI Uyumsuzluk', -1, 'Negatif');
    }

    // --- MACD ---
    if(d.macd){
      var mac;
      if(d.macd.cross==='bull') mac=1;
      else if(d.macd.cross==='bear') mac=-1;
      else mac=d.macd.aboveSignal?0.5:-0.5;
      addVote('MACD Sinyal', mac, d.macd.cross==='bull'?'AL kesişimi':d.macd.cross==='bear'?'SAT kesişimi':(d.macd.aboveSignal?'Pozitif momentum':'Negatif momentum'));
      addVote('MACD Sıfır Çizgisi', d.macd.aboveZero?0.5:-0.5, d.macd.aboveZero?'Sıfır üstü':'Sıfır altı');
      if(d.macd.divergence==='bullish') addVote('MACD Uyumsuzluk', 1, 'Pozitif');
      else if(d.macd.divergence==='bearish') addVote('MACD Uyumsuzluk', -1, 'Negatif');
    }

    // --- BOLLINGER ---
    if(d.bollinger){
      var bq={above_upper:-1, upper_half:-0.5, lower_half:0.5, below_lower:1}[d.bollinger.pos];
      addVote('Bollinger %B', bq, {above_upper:'Üst bant üstü (aşırı alım)',upper_half:'Üst yarı',lower_half:'Alt yarı',below_lower:'Alt bant altı (aşırı satım)'}[d.bollinger.pos]);
    }

    // --- SUPERTREND ---
    if(d.supertrend){
      addVote('Supertrend', d.supertrend.direction==='up'?1.5:-1.5, d.supertrend.direction==='up'?'AL':'SAT', true);
    }

    // --- ICHIMOKU (bulut + birleşik teyit) ---
    if(d.ichimoku){
      var iq=d.ichimoku.pricePos==='above'?1.5:d.ichimoku.pricePos==='below'?-1.5:0;
      addVote('Ichimoku Bulut', iq, d.ichimoku.pricePos==='above'?'Bulut üstünde':d.ichimoku.pricePos==='below'?'Bulut altında':'Bulut içinde', true);
      // TK + renk birleşik teyit (±0.5)
      var tkV=d.ichimoku.tkCross==='bull'?1:d.ichimoku.tkCross==='bear'?-1:0;
      var rnV=d.ichimoku.cloudColor==='green'?1:-1;
      var confSum=tkV+rnV;
      var confPts=confSum>0?0.5:confSum<0?-0.5:0;

    var rsi=d.rsi, rsiCls,rsiLabel,rsiLabelColor,rsiDesc;

      if(d.mtf.d1) dirs.push(d.mtf.d1.dir);
      if(d.mtf.w1) dirs.push(d.mtf.w1.dir);
      var ups=dirs.filter(function(x){return x==='up';}).length;
      var downs=dirs.filter(function(x){return x==='down';}).length;
      var verdict,vCls;
      if(dirs.length>0 && ups===dirs.length){verdict='✅ TAM UYUM — Tüm zaman dilimleri YÜKSELİŞ yönünde. Güçlü teyit, trend her vadede yukarı.';vCls='green';}
      else if(dirs.length>0 && downs===dirs.length){verdict='❌ TAM UYUM — Tüm zaman dilimleri DÜŞÜŞ yönünde. Güçlü teyit, trend her vadede aşağı.';vCls='red';}
      else if(ups>downs){verdict='🔼 KISMİ UYUM — Çoğunluk yükseliş yönünde ama tam hizalanma yok. Temkinli iyimser.';vCls='yellow';}
      else if(downs>ups){verdict='🔽 KISMİ UYUM — Çoğunluk düşüş yönünde ama tam hizalanma yok. Temkinli.';vCls='yellow';}
      else{verdict='⚠️ ÇELİŞKİ — Zaman dilimleri farklı yönleri gösteriyor. Net trend yok, dikkatli olun.';vCls='yellow';}
      mtfBox='<div class="sr-wrap" style="border-left:5px solid '+(vCls==='green'?'#00c853':vCls==='red'?'#ff4444':'#f0b90b')+'">'+
        tfRow('1 SAAT',d.mtf.h1)+tfRow('GÜNLÜK',d.mtf.d1)+tfRow('HAFTALIK',d.mtf.w1)+
        '<hr class="sr-divider"><div class="vol-desc" style="font-size:.9rem;color:#ccc">'+verdict+'</div>'+
        '<div class="vol-desc" style="margin-top:8px">Her zaman dilimi 3 ölçütle değerlendirilir: fiyatın EMA50\'ye göre konumu, Supertrend yönü ve MACD\'nin sıfır çizgisine göre konumu. Birden fazla vade aynı yönü gösterdiğinde sinyal güvenilirliği artar.</div></div>';
    } else { mtfBox='<div class="sr-wrap"><div class="vol-desc">Veri yok</div></div>'; }

    var stBox='';
    var stBox='';
    if(d.supertrend){
      var st=d.supertrend, up=st.direction==='up', stCls=up?'up':'down';
      var stMain=up?'🟢 AL (Yükseliş)':'🔴 SAT (Düşüş)', stDist=st.dist>=0?'+'+st.dist:st.dist;
      var stDesc=up?'Fiyat Supertrend çizgisinin üstünde — trend yukarı. Çizgi (₺'+st.value+') altında stop/destek gibi çalışır.':'Fiyat Supertrend çizgisinin altında — trend aşağı. Çizgi (₺'+st.value+') üstünde direnç/stop gibi çalışır.';
      stBox='<div class="st-box '+stCls+'"><div class="st-top"><span class="st-main '+stCls+'">'+stMain+'</span><span class="st-sub">Çizgi: ₺'+st.value+' ('+stDist+'% mesafe) | ATR: '+st.atr+'</span></div><div class="st-desc">'+stDesc+'</div></div>';
    }

    var ichBox='';
    if(d.ichimoku){
      var ic=d.ichimoku, posCls=ic.pricePos, posMain, posVerdict;
      if(ic.pricePos==='above'){ posMain='🟢 Bulutun ÜSTÜNDE'; posVerdict='Fiyat bulutun üstünde — yükseliş trendinin en güçlü işareti. Bulut (₺'+ic.cloudBottom+' - ₺'+ic.cloudTop+') altta destek.'; }
      else if(ic.pricePos==='below'){ posMain='🔴 Bulutun ALTINDA'; posVerdict='Fiyat bulutun altında — düşüş baskın. Bulut (₺'+ic.cloudBottom+' - ₺'+ic.cloudTop+') üstte direnç.'; }
      else { posMain='🟡 Bulutun İÇİNDE'; posVerdict='Fiyat bulutun içinde — kararsızlık. Trend net değil, bu bölgede işlem riskli.'; }
      var tkText,tkDesc;
      if(ic.tkCross==='bull'){ tkText='<b style="color:#00c853">Pozitif (Tenkan > Kijun)</b>'; tkDesc='Kısa vadeli momentum yukarı, alım sinyalini destekliyor.'; }
      else if(ic.tkCross==='bear'){ tkText='<b style="color:#ff4444">Negatif (Tenkan < Kijun)</b>'; tkDesc='Kısa vadeli momentum aşağı, satış baskısı var.'; }
      else { tkText='<b>Nötr</b>'; tkDesc='Çizgiler eşit, belirgin sinyal yok.'; }
      var cloudBadge=ic.cloudColor==='green'?'<span class="cloud-badge green">YEŞİL ☁️</span>':'<span class="cloud-badge red">KIRMIZI ☁️</span>';
      var cloudDesc=ic.cloudColor==='green'?'Önümüzdeki bulut yeşil (Senkou A > Senkou B) — gelecek beklentisi pozitif.':'Önümüzdeki bulut kırmızı (Senkou A < Senkou B) — gelecek beklentisi negatif.';
      ichBox='<div class="ich-wrap '+posCls+'"><div class="ich-main '+posCls+'">'+posMain+'</div><div class="ich-verdict">'+posVerdict+'</div><div class="ich-lines"><div class="ich-line"><div class="ich-line-name">TENKAN (9)</div><div class="ich-line-val">₺'+ic.tenkan+'</div></div><div class="ich-line"><div class="ich-line-name">KIJUN (26)</div><div class="ich-line-val">₺'+ic.kijun+'</div></div><div class="ich-line"><div class="ich-line-name">SENKOU A</div><div class="ich-line-val">₺'+ic.senkouA+'</div></div><div class="ich-line"><div class="ich-line-name">SENKOU B</div><div class="ich-line-val">₺'+ic.senkouB+'</div></div></div><div class="ich-sub">Tenkan / Kijun: '+tkText+'<br>'+tkDesc+'</div><div class="ich-sub">Bulut Rengi: '+cloudBadge+'<br>'+cloudDesc+'</div></div>';
    } else { ichBox='<div class="ich-wrap"><div class="vol-desc">Bu zaman dilimi için yeterli veri yok (en az 52 bar).</div></div>'; }

    r.innerHTML=
      '<div class="price-header"><div class="tk">📈 '+d.ticker+' <span id="favStar" class="fav-star" onclick="toggleFav(currentTicker)">☆</span></div><div class="pr">₺'+d.currentPrice+'</div><div class="tf">'+tfLabels[d.timeframe]+' grafik</div></div>'+
      '<div class="section">'+summaryBox+targetBox+'</div>'+
      '<div class="section"><div class="section-title">Destek / Direnç Seviyeleri</div>'+srBox+'</div>'+
      '<div class="section"><div class="section-title">Fiyat Grafiği</div>'+buildChart(d)+'</div>'+
      '<div class="section"><div class="section-title">Üstel Hareketli Ortalamalar (EMA)</div><div class="grid">'+maBoxes+'</div></div>'+
      '<div class="section"><div class="section-title"><span>Hacim Analizi</span><div class="period-btns"><button id="pb_d1" onclick="setPeriod(\'d1\')">1 Bar</button><button id="pb_d5" onclick="setPeriod(\'d5\')">5 Bar</button><button id="pb_d20" onclick="setPeriod(\'d20\')">20 Bar</button></div></div><div class="grid">'+volBoxes+'</div></div>'+
      '<div class="section"><div class="section-title">RSI (14) — Göreceli Güç Endeksi</div><div class="grid">'+rsiBox+sigBox+'</div></div>'+
      '<div class="section"><div class="section-title">MFI (14) — Para Akış Endeksi</div><div class="grid">'+mfiBox+'</div></div>'+
      '<div class="section"><div class="section-title">Momentum (10) + 15 Bar Ortalaması</div><div class="grid">'+momBoxes+'</div></div>'+
      '<div class="section"><div class="section-title">CCI (20) + 14 Bar Ortalaması</div><div class="grid">'+cciBoxes+'</div></div>'+
      '<div class="section"><div class="section-title">MACD (12-26-9)</div><div class="grid">'+macdBoxes+'</div></div>'+
      '<div class="section"><div class="section-title">Bollinger Bantları (20, 2) — Volatilite</div><div class="grid">'+bollBox+'</div></div>'+
      '<div class="section"><div class="section-title">Mum Formasyonları — Fiyat Hareketi (Price Action)</div><div class="grid">'+candleBox+'</div></div>'+
      '<div class="section"><div class="section-title">ADX (14) — Trend Gücü & Yön</div><div class="grid">'+adxBox+'</div></div>'+
      '<div class="section"><div class="section-title">Çoklu Zaman Dilimi Uyumu</div>'+mtfBox+'</div>'+
      '<div class="section"><div class="section-title">Supertrend — Trend Yönü</div>'+stBox+'</div>'+
      '<div class="section"><div class="section-title">Ichimoku Bulutu — Kapsamlı Trend Analizi</div>'+ichBox+'</div>';

    selectedPeriod='d1';
    renderPriceVol();
    updateStar();

  }catch(e){ r.innerHTML='<p class="error">❌ Hata: '+e.message+'</p>'; }
}
  // ===== ÖZEL ANALİZ SİSTEMİ =====
document.getElementById('btnOzel').addEventListener('click', runOzel);
document.getElementById('tiOzel').addEventListener('keypress', function(e){ if(e.key==='Enter') runOzel(); });
document.getElementById('scanBtnOzel').addEventListener('click', runScanOzel);

function ozelVerdictColor(v){ return {'GÜÇLÜ AL':'#00c853','AL':'#66bb6a','NÖTR':'#f0b90b','SAT':'#ff7043','GÜÇLÜ SAT':'#ff4444'}[v]||'#888'; }
function ozelVerdictEmoji(v){ return {'GÜÇLÜ AL':'🟢🟢','AL':'🟢','NÖTR':'🟡','SAT':'🔴','GÜÇLÜ SAT':'🔴🔴'}[v]||''; }

function ozelCard(d){
  var vc=ozelVerdictColor(d.verdict), ve=ozelVerdictEmoji(d.verdict);
  var maBoxes=d.mas.map(function(m){
    var cls=m.above?'up':'down', sign=m.diff>=0?'+':'';
    return '<div class="ma-box '+cls+'"><div class="ma-name">EMA'+m.period+'</div><div class="ma-value">₺'+m.value+'</div><div class="ma-diff '+cls+'">'+sign+m.diff+'%</div><div class="ma-status">'+(m.above?'Fiyat üstünde':'Fiyat altında')+'</div></div>';
  }).join('');
  return '<div style="background:#1a1a1a;border-radius:16px;padding:22px;border:2px solid '+vc+'">'+
    '<div style="text-align:center;margin-bottom:16px"><div style="color:#9c27b0;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">🧪 Özel Analiz — '+d.ticker+'</div>'+
    '<div style="font-size:2.2rem;font-weight:bold;color:'+vc+'">'+ve+' '+d.verdict+'</div>'+
    '<div style="color:#aaa;margin-top:6px">₺'+d.price+' &nbsp;|&nbsp; Skor: %'+d.pct+'</div></div>'+
    '<div class="bar-bg" style="height:12px;margin-bottom:18px;background:linear-gradient(to right,#ff4444,#f0b90b,#00c853)"><div style="height:100%;width:3px;background:#fff;margin-left:calc('+d.pct+'% - 1px)"></div></div>'+
    '<div class="grid">'+maBoxes+'</div>'+
    '<div class="grid" style="margin-top:12px">'+
      '<div class="vol-box"><div class="vol-label">RSI (14)</div><div class="vol-main">'+d.rsi+'</div></div>'+
      '<div class="vol-box"><div class="vol-label">Hacim Oranı</div><div class="vol-main">'+d.volRatio+'x</div></div>'+
      '<div class="vol-box"><div class="vol-label">ADX</div><div class="vol-main">'+(d.adx!==null?d.adx:'-')+'</div></div>'+
    '</div>'+
    '<div class="vol-desc" style="margin-top:14px">Bu deneysel özel analiz sistemidir. Yatırım tavsiyesi değildir.</div>'+
  '</div>';
}

async function runOzel(){
  var t=document.getElementById('tiOzel').value.trim().toUpperCase();
  if(!t) return;
  var box=document.getElementById('resultOzel');
  box.style.display='block';
  box.innerHTML='<p class="loading">⏳ Özel analiz yükleniyor...</p>';
  try{
    var res=await fetch('/analyze-ozel/'+t);
    var d=await res.json();
    if(d.error){ box.innerHTML='<p class="error">❌ '+d.error+'</p>'; return; }
    box.innerHTML=ozelCard(d);
    window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){ box.innerHTML='<p class="error">❌ Hata: '+e.message+'</p>'; }
}

async function runScanOzel(){
  var btn=document.getElementById('scanBtnOzel');
  var box=document.getElementById('scanResult');
  btn.disabled=true; btn.textContent='⏳ Taranıyor...';
  box.style.display='block';
  box.innerHTML='<div style="background:#1a1a1a;border-radius:12px;padding:30px;text-align:center;color:#aaa">⏳ Özel tarama çalışıyor (1-2 dk)...</div>';
  try{
    var res=await fetch('/scan-ozel');
    var d=await res.json();
    if(!d.results){ box.innerHTML='<div class="error">Tarama başarısız.</div>'; btn.disabled=false; btn.textContent='🧪 BIST100 Tara Özel'; return; }
    var groups={'GÜÇLÜ AL':[],'AL':[],'NÖTR':[],'SAT':[],'GÜÇLÜ SAT':[]};
    d.results.forEach(function(r){ if(groups[r.verdict]) groups[r.verdict].push(r); });
    var html='<div style="background:#1a1a1a;border-radius:16px;padding:20px"><div style="color:#9c27b0;font-size:1.1rem;font-weight:bold;margin-bottom:16px">🧪 Özel Tarama Sonuçları ('+d.count+' hisse)</div>';
    ['GÜÇLÜ AL','AL','NÖTR','SAT','GÜÇLÜ SAT'].forEach(function(g){
      var arr=groups[g]; if(arr.length===0) return;
      var c=ozelVerdictColor(g), e=ozelVerdictEmoji(g);
      html+='<div style="margin-bottom:18px"><div style="color:'+c+';font-size:.85rem;font-weight:bold;margin-bottom:8px;border-bottom:1px solid #2a2a2a;padding-bottom:6px">'+e+' '+g+' ('+arr.length+')</div><div style="display:flex;flex-wrap:wrap;gap:8px">';
      arr.forEach(function(r){
        html+='<div onclick="document.getElementById(\'tiOzel\').value=\''+r.ticker+'\';runOzel()" style="cursor:pointer;background:#0f0f0f;border:1px solid #2a2a2a;border-left:3px solid '+c+';border-radius:8px;padding:8px 12px;min-width:130px" onmouseover="this.style.background=\'#252525\'" onmouseout="this.style.background=\'#0f0f0f\'"><div style="display:flex;justify-content:space-between;gap:10px"><span style="color:#f0b90b;font-weight:bold;font-size:.9rem">'+r.ticker+'</span><span style="color:'+c+';font-weight:bold;font-size:.85rem">%'+r.pct+'</span></div><div style="color:#888;font-size:.75rem;margin-top:2px">₺'+r.price+'</div></div>';
      });
      html+='</div></div>';
    });
    html+='<div class="vol-desc" style="margin-top:8px">Deneysel özel tarama. Yatırım tavsiyesi değildir.</div></div>';
    box.innerHTML=html;
  }catch(e){ box.innerHTML='<div class="error">❌ Hata: '+e.message+'</div>'; }
  btn.disabled=false; btn.textContent='🧪 BIST100 Tara Özel';
}
</script>
